name: Build Desktop App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Executable
        # We use PowerShell (default on Windows runner) so we use the ` backtick for line breaks
        run: |
          pyinstaller --noconsole --onedir --clean `
            --collect-all customtkinter `
            --collect-all pymupdf `
            --name "PDF_to_Markdown" main.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDF-to-Markdown-Windows
          # This MUST match the --name used in the PyInstaller step above
          path: dist/PDF_to_Markdown/





