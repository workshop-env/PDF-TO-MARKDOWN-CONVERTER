name: Build Desktop App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  # This forces the GitHub runner to use Node 24 for all actions
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip uninstall -y pathlib
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Executable
        run: |
          # --collect-all pymupdf is critical to fix the error in image_ed0abd.png
          pyinstaller --noconsole --onefile `
            --collect-all customtkinter `
            --collect-all pymupdf `
            --name "PDF_to_Markdown" main.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDF-Converter-Windows
          path: dist/PDF_to_Markdown.exe








  

   




   




